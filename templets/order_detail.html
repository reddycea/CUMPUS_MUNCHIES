<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Details - Campus Munchies</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body {background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://wallpaperaccess.com/full/5674818.jpg') no-repeat center center/cover;color:#fff;min-height:100vh}
header {background:linear-gradient(to right,rgba(0,0,0,0.9),rgba(0,0,0,0.7));color:white;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;height:70px;position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo {font-weight:700;font-size:1.6rem;background:linear-gradient(45deg,#ff9a3d,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav a {margin-left:2rem;font-weight:500;transition:all 0.3s ease;display:inline-flex;align-items:center;padding:8px 15px;border-radius:5px;color:#fff;text-decoration:none}
nav a:hover {color:#ff9a3d;background:rgba(255,255,255,0.05);transform:translateY(-2px)}
.container {max-width:800px;margin:2rem auto;padding:0 2rem}
.page-header {display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:15px}
.page-header h1 {color:#ff9a3d}
.order-card {background:rgba(255,255,255,0.1);padding:30px;border-radius:12px;backdrop-filter:blur(10px);margin-bottom:2rem}
.order-info-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:25px}
.info-group label {display:block;color:rgba(255,255,255,0.7);font-size:0.9rem;margin-bottom:5px}
.info-group div {font-weight:600}
.status-badge {padding:8px 15px;border-radius:20px;font-weight:600;display:inline-block}
.status-pending {background:#fff3cd;color:#856404}
.status-confirmed {background:#d1ecf1;color:#0c5460}
.status-paid {background:#d4edda;color:#155724}
.status-ready {background:#d4edda;color:#155724}
.status-delivered {background:#d4edda;color:#155724}
.status-completed {background:#d4edda;color:#155724}
.status-cancelled {background:#f8d7da;color:#721c24}
.status-refunded {background:#e2e3e5;color:#383d41}
.order-items {margin:25px 0}
.order-item {display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.order-item:last-child {border-bottom:none}
.item-info h4 {margin-bottom:5px;color:#ff9a3d}
.item-meta {color:rgba(255,255,255,0.7);font-size:0.9rem}
.item-total {font-weight:600}
.order-summary {border-top:2px solid rgba(255,255,255,0.2);padding-top:20px;margin-top:20px}
.summary-row {display:flex;justify-content:space-between;margin-bottom:10px}
.summary-total {font-size:1.3rem;font-weight:700;color:#ff9a3d;border-top:1px solid rgba(255,255,255,0.2);padding-top:15px;margin-top:15px}
.order-actions {display:flex;gap:15px;flex-wrap:wrap;margin-top:25px}
.btn {background:linear-gradient(to right,#ff9a3d,#ff6b6b);color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:600;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn:hover {transform:translateY(-2px);box-shadow:0 5px 15px rgba(255,154,61,0.4)}
.btn-secondary {background:rgba(255,255,255,0.2)}
.btn-secondary:hover {background:rgba(255,255,255,0.3)}
.btn-success {background:#28a745}
.btn-danger {background:#dc3545}
.timeline {margin-top:30px}
.timeline h3 {margin-bottom:15px;color:#ff9a3d}
.timeline-steps {display:flex;flex-direction:column;gap:15px}
.timeline-step {display:flex;align-items:flex-start;gap:15px}
.timeline-icon {width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.timeline-content {flex:1}
.timeline-content h4 {margin-bottom:5px}
.timeline-content p {color:rgba(255,255,255,0.7);font-size:0.9rem}
.timeline-step.active .timeline-icon {background:linear-gradient(to right,#ff9a3d,#ff6b6b)}
.timeline-step.completed .timeline-icon {background:#28a745}
.delivery-info {background:rgba(255,255,255,0.05);padding:15px;border-radius:8px;margin-top:15px;border-left:3px solid #ff9a3d;display:none;}
.delivery-info h4 {color:#ff9a3d;margin-bottom:8px;}
.delivery-info p {color:rgba(255,255,255,0.8);margin:5px 0;}
.toast {position:fixed;top:20px;right:20px;padding:15px 20px;border-radius:8px;background:#28a745;color:white;z-index:10000;transform:translateX(400px);transition:transform 0.3s ease;}
.toast.show {transform:translateX(0);}
.toast.error {background:#dc3545;}
.loading {text-align:center;padding:40px;color:#ff9a3d;font-size:1.2rem;}
.loading i {font-size:2rem;margin-bottom:15px;}
.hidden {display:none;}
@media (max-width:768px) {.container {padding:10px}.page-header {flex-direction:column;align-items:flex-start}.order-info-grid {grid-template-columns:1fr}.order-actions {justify-content:center}}
</style>
</head>
<body>
<header>
<div class="logo">Campus Munchies</div>
<nav>
<a href="/campusmunchies.com/"><i class="fas fa-home"></i> Home</a>
<a href="/campusmunchies.com/orders"><i class="fas fa-receipt"></i> My Orders</a>
<a href="/campusmunchies.com/notifications"><i class="fas fa-bell"></i> Notifications</a>
<a href="/campusmunchies.com/profile"><i class="fas fa-user"></i> Profile</a>
</nav>
</header>

<div class="container">
<div class="loading" id="loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading order details...</p>
</div>

<div class="hidden" id="order-content">
    <div class="page-header">
        <h1><i class="fas fa-receipt"></i> Order #<span id="order-number">-</span></h1>
        <span class="status-badge" id="order-status">Loading...</span>
    </div>

    <div class="order-card">
        <div class="order-info-grid">
            <div class="info-group">
                <label>Store</label>
                <div id="store-name">-</div>
            </div>
            <div class="info-group">
                <label>Order Date</label>
                <div id="order-date">-</div>
            </div>
            <div class="info-group">
                <label>Payment Method</label>
                <div id="payment-method">-</div>
            </div>
            <div class="info-group">
                <label>Order Type</label>
                <div id="order-type">-</div>
            </div>
        </div>

        <div class="delivery-info" id="delivery-info">
            <h4><i class="fas fa-map-marker-alt"></i> Delivery Information</h4>
            <p><strong>Address:</strong> <span id="delivery-address">-</span></p>
        </div>

        <div class="order-items">
            <h3 style="color:#ff9a3d;margin-bottom:15px">Order Items</h3>
            <div id="order-items-list">
                <!-- Order items will be populated here -->
            </div>
        </div>

        <div class="order-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">R0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax:</span>
                <span>R0.00</span>
            </div>
            <div class="summary-row" id="delivery-fee-row" style="display:none;">
                <span>Delivery Fee:</span>
                <span>R25.00</span>
            </div>
            <div class="summary-total">
                <span>Total:</span>
                <span id="total-amount">R0.00</span>
            </div>
        </div>

        <div class="order-actions">
            <a href="/campusmunchies.com/orders" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Orders
            </a>
            <button class="btn btn-danger" id="cancel-btn" style="display:none;">
                <i class="fas fa-times"></i> Cancel Order
            </button>
            <button class="btn btn-success" id="received-btn" style="display:none;">
                <i class="fas fa-check"></i> Mark as Received
            </button>
            <button class="btn" id="reorder-btn" style="display:none;">
                <i class="fas fa-redo"></i> Reorder
            </button>
        </div>
    </div>

    <div class="timeline">
        <h3><i class="fas fa-history"></i> Order Timeline</h3>
        <div class="timeline-steps" id="timeline-steps">
            <!-- Timeline steps will be populated here -->
        </div>
    </div>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
// Get order ID from URL
function getOrderIdFromUrl() {
    const path = window.location.pathname;
    const match = path.match(/\/orders\/(\d+)/);
    return match ? match[1] : null;
}
const utils = {
    getCSRFToken() {
        return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
    }
};
// Format currency
function formatCurrency(amount) {
    return 'R' + parseFloat(amount).toFixed(2);
}

// Format date
function formatDate(dateString) {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    return date.toLocaleString('en-ZA', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// Format text (replace underscores with spaces and capitalize)
function formatText(text) {
    if (!text) return 'N/A';
    return text.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}

// Show/hide loading state
function setLoading(loading) {
    document.getElementById('loading').style.display = loading ? 'block' : 'none';
    document.getElementById('order-content').style.display = loading ? 'none' : 'block';
}

// Show toast message
function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${isError ? 'error' : ''} show`;
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// Update order status badge
function updateStatusBadge(status) {
    const badge = document.getElementById('order-status');
    badge.textContent = formatText(status);
    badge.className = `status-badge status-${status}`;
}

// Update order actions based on status
function updateOrderActions(order) {
    const cancelBtn = document.getElementById('cancel-btn');
    const receivedBtn = document.getElementById('received-btn');
    const reorderBtn = document.getElementById('reorder-btn');

    // Reset all buttons
    cancelBtn.style.display = 'none';
    receivedBtn.style.display = 'none';
    reorderBtn.style.display = 'none';

    // Show appropriate buttons based on status
    if (['pending', 'confirmed'].includes(order.status)) {
        cancelBtn.style.display = 'inline-flex';
        cancelBtn.onclick = () => cancelOrder(order.id);
    }

    if (order.status === 'ready' && order.order_type !== 'delivery') {
        receivedBtn.style.display = 'inline-flex';
        receivedBtn.onclick = () => markOrderReceived(order.id);
    }

    if (['delivered', 'completed', 'cancelled'].includes(order.status)) {
        reorderBtn.style.display = 'inline-flex';
        reorderBtn.onclick = () => reorder(order.id);
    }
}

// Update timeline based on order status
function updateTimeline(status) {
    const timeline = document.getElementById('timeline-steps');
    const steps = [
        { id: 'placed', icon: 'fa-receipt', title: 'Order Placed', description: 'Your order has been received' },
        { id: 'confirmed', icon: 'fa-utensils', title: 'Order Confirmed', description: 'Restaurant is preparing your order' },
        { id: 'paid', icon: 'fa-credit-card', title: 'Payment Processed', description: 'Payment has been completed' },
        { id: 'ready', icon: 'fa-check-circle', title: 'Ready for Pickup/Delivery', description: 'Your order is ready' },
        { id: 'completed', icon: 'fa-truck', title: 'Delivered/Completed', description: 'Order has been delivered or picked up' }
    ];

    const statusOrder = ['pending', 'confirmed', 'paid', 'ready', 'completed', 'delivered'];
    const currentStatusIndex = statusOrder.indexOf(status);

    timeline.innerHTML = steps.map((step, index) => {
        const stepStatus = statusOrder[index];
        let stepClass = '';
        
        if (currentStatusIndex > index) {
            stepClass = 'completed';
        } else if (currentStatusIndex === index) {
            stepClass = 'active';
        }

        return `
            <div class="timeline-step ${stepClass}">
                <div class="timeline-icon">
                    <i class="fas ${step.icon}"></i>
                </div>
                <div class="timeline-content">
                    <h4>${step.title}</h4>
                    <p>${step.description}</p>
                </div>
            </div>
        `;
    }).join('');
}

// Load order details
async function loadOrderDetails() {
    const orderId = getOrderIdFromUrl();
    if (!orderId) {
        showToast('Invalid order ID', true);
        return;
    }

    setLoading(true);

    try {
        const response = await fetch(`/campusmunchies.com/api/orders`);
        
        if (!response.ok) {
            throw new Error('Failed to fetch orders');
        }

        const orders = await response.json();
        
        if (!Array.isArray(orders)) {
            throw new Error('Invalid response format');
        }

        // Find the specific order
        const order = orders.find(o => o.id === parseInt(orderId));
        
        if (!order) {
            throw new Error('Order not found');
        }

        // Update page with order data
        document.getElementById('order-number').textContent = order.order_number;
        document.getElementById('store-name').textContent = order.store_name;
        document.getElementById('order-date').textContent = formatDate(order.created_at);
        document.getElementById('payment-method').textContent = formatText(order.payment_method);
        document.getElementById('order-type').textContent = formatText(order.order_type);

        // Update status
        updateStatusBadge(order.status);

        // Update delivery info if applicable
        if (order.order_type === 'delivery' && order.delivery_address) {
            document.getElementById('delivery-info').style.display = 'block';
            document.getElementById('delivery-address').textContent = order.delivery_address;
            document.getElementById('delivery-fee-row').style.display = 'flex';
        }

        // Update order items
        const itemsList = document.getElementById('order-items-list');
        itemsList.innerHTML = order.items.map(item => `
            <div class="order-item">
                <div class="item-info">
                    <h4>${item.name}</h4>
                    <div class="item-meta">Quantity: ${item.quantity} × ${formatCurrency(item.price)}</div>
                </div>
                <div class="item-total">${formatCurrency(item.quantity * item.price)}</div>
            </div>
        `).join('');

        // Update totals
        const subtotal = order.amount || 0;
        const deliveryFee = order.order_type === 'delivery' ? 25.00 : 0;
        const total = subtotal + deliveryFee;

        document.getElementById('subtotal').textContent = formatCurrency(subtotal);
        document.getElementById('total-amount').textContent = formatCurrency(total);

        // Update actions and timeline
        updateOrderActions(order);
        updateTimeline(order.status);

        setLoading(false);

        // Auto-refresh for active orders
        if (['pending', 'confirmed', 'paid', 'ready'].includes(order.status)) {
            setTimeout(() => {
                loadOrderDetails();
            }, 30000);
        }

    } catch (error) {
        console.error('Error loading order details:', error);
        showToast('Failed to load order details', true);
        setLoading(false);
    }
}

// Order action functions
async function cancelOrder(orderId) {
    const reason = prompt('Please enter a reason for cancellation:');
    if (!reason) return;

    const action = confirm('Would you like a refund for this order? Click OK for refund, Cancel to donate to the store.');
    const actionType = action ? 'refund' : 'donate';

    try {
        const response = await fetch(`/campusmunchies.com/orders/${orderId}/cancel`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                action: actionType,
                reason: reason
            })
        });

        const result = await response.json();

        if (response.ok) {
            showToast(result.message || 'Order cancelled successfully');
            setTimeout(() => {
                loadOrderDetails();
            }, 1500);
        } else {
            showToast(result.error || 'Error cancelling order', true);
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('An error occurred while cancelling the order.', true);
    }
}

async function markOrderReceived(orderId) {
    if (!confirm('Mark this order as received?')) return;

    try {
        const response = await fetch(`/campusmunchies.com/orders/${orderId}/received`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });

        const result = await response.json();

        if (response.ok) {
            showToast(result.message || 'Order marked as received');
            setTimeout(() => {
                loadOrderDetails();
            }, 1500);
        } else {
            showToast(result.error || 'Error marking order as received', true);
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('An error occurred while marking the order as received.', true);
    }
}
async function reorder(orderId) {
    try {
        const response = await fetch(`/campusmunchies.com/orders/${orderId}/reorder`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': utils.getCSRFToken()
            }
        });

        const result = await response.json();

        if (response.ok) {
            let message = result.message;
            
            // Show detailed information about what was added
            if (result.added_to_cart && result.added_to_cart.length > 0) {
                const addedItems = result.added_to_cart.map(item => 
                    `${item.name} (Qty: ${item.quantity})`
                ).join(', ');
                message += `: ${addedItems}`;
            }
            
            showToast(message);
            
            // Refresh cart to show updated items
            await loadCart();
            
            // Redirect to checkout after a short delay
            setTimeout(() => {
                window.location.href = `/campusmunchies.com/${result.store_name}/checkout`;
            }, 1500);
        } else {
            showToast(result.error || 'Error recreating order', true);
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('An error occurred while reordering.', true);
    }
}

// Initialize page
document.addEventListener('DOMContentLoaded', function() {
    loadOrderDetails();
});
</script>
</body>
</html>
