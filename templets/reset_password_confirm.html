<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Campus Munchies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9a3d;
            --secondary-color: #ff6b6b;
            --gradient-start: #ff9a3d;
            --gradient-end: #ff6b6b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://wallpaperaccess.com/full/5674818.jpg') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .reset-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: white;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255, 154, 61, 0.2);
            outline: none;
            background: rgba(255, 255, 255, 0.15);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 154, 61, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 500;
        }
        
        .message.success {
            background: rgba(40, 167, 69, 0.9);
            color: white;
        }
        
        .message.error {
            background: rgba(220, 53, 69, 0.9);
            color: white;
        }
        
        .message.info {
            background: rgba(23, 162, 184, 0.9);
            color: white;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .code-input {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        
        .code-input input {
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 18px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .resend-link {
            text-align: center;
            margin-top: 10px;
        }
        
        .resend-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }
        
        .resend-link a:hover {
            text-decoration: underline;
        }
        
        .password-requirements {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">Campus Munchies</div>
        <h2>Reset Your Password</h2>
        
        <div id="message-container"></div>
        <div class="loading" id="loading">Processing...</div>
        
        <!-- Step 1: Enter Reset Code -->
        <div id="step-1" class="step active">
            <form id="verify-code-form">
                <input type="hidden" id="reset-token" value="{{ reset_token }}">
                
                <div class="form-group">
                    <label for="reset-code">Reset Code</label>
                    <div class="code-input">
                        <input type="text" id="reset-code" placeholder="000000" maxlength="6" required 
                               pattern="[0-9]{6}" title="Please enter the 6-digit code sent to your email">
                    </div>
                    <small style="color:rgba(255,255,255,0.7);font-size:12px">
                        Enter the 6-digit code sent to your email
                    </small>
                </div>
                
                <button type="submit" id="verify-btn">Verify Code</button>
                
                <div class="resend-link">
                    <a href="#" onclick="resendCode()">Resend Code</a>
                </div>
            </form>
        </div>
        
        <!-- Step 2: Set New Password -->
        <div id="step-2" class="step">
            <form id="reset-password-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" required 
                           minlength="6" maxlength="100">
                    <div class="password-requirements">
                        Must be at least 6 characters long
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required 
                           minlength="6" maxlength="100">
                </div>
                
                <button type="submit" id="reset-btn">Reset Password</button>
            </form>
        </div>
        
        <div class="back-link">
            <a href="/campusmunchies.com/login">Back to Login</a>
        </div>
    </div>

    <script>
        let resetToken = document.getElementById('reset-token').value;
        
        function showMessage(message, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}">${message}</div>`;
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('verify-btn').disabled = show;
            if (document.getElementById('reset-btn')) {
                document.getElementById('reset-btn').disabled = show;
            }
        }
        
        function showStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById(`step-${stepNumber}`).classList.add('active');
        }
        
        async function resendCode() {
            showLoading(true);
            try {
                const response = await fetch('/campusmunchies.com/password/reset/request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        reset_token: resetToken
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Reset code has been resent to your email', 'success');
                } else {
                    showMessage(data.error || 'Failed to resend code', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('An error occurred while resending the code', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        document.getElementById('verify-code-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resetCode = document.getElementById('reset-code').value.trim();
            
            if (!resetCode || resetCode.length !== 6) {
                showMessage('Please enter a valid 6-digit code', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch('/campusmunchies.com/password/reset/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        reset_token: resetToken,
                        reset_code: resetCode
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Code verified successfully! Please set your new password.', 'success');
                    showStep(2);
                } else {
                    showMessage(data.error || 'Invalid or expired reset code', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('An error occurred while verifying the code', 'error');
            } finally {
                showLoading(false);
            }
        });
        
        document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (!newPassword || !confirmPassword) {
                showMessage('Please fill in all password fields', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch('/campusmunchies.com/password/reset/confirm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        reset_token: resetToken,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(data.message || 'Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/campusmunchies.com/login';
                    }, 3000);
                } else {
                    showMessage(data.error || 'Failed to reset password', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('An error occurred while resetting your password', 'error');
            } finally {
                showLoading(false);
            }
        });
        
        // Auto-advance code input
        document.getElementById('reset-code').addEventListener('input', function(e) {
            const value = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = value;
            
            if (value.length === 6) {
                document.getElementById('verify-btn').focus();
            }
        });
        
        // Password confirmation validation
        document.getElementById('confirm-password').addEventListener('input', function(e) {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = e.target.value;
            
            if (confirmPassword && newPassword !== confirmPassword) {
                e.target.style.borderColor = '#dc3545';
            } else {
                e.target.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            }
        });
        
        // Check if token is valid on page load
        window.addEventListener('load', async function() {
            if (!resetToken) {
                showMessage('Invalid reset link. Please request a new password reset.', 'error');
                return;
            }
            
            try {
                const response = await fetch('/campusmunchies.com/password/reset/status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        reset_token: resetToken
                    })
                });
                
                const data = await response.json();
                
                if (!data.valid) {
                    showMessage('This reset link has expired or is invalid. Please request a new one.', 'error');
                    document.getElementById('verify-btn').disabled = true;
                }
            } catch (error) {
                console.error('Error checking reset token status:', error);
            }
        });
    </script>
</body>
</html>
